<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="./styles/font.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/card.css">
    <link rel="stylesheet" href="./styles/type.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/footer.css">
    <link rel="stylesheet" href="./styles/basic.css">
    <link rel="shortcut icon" href="./assets/icons/pokeball.svg" type="image/x-icon">

    <script src="./scripts/database.js"></script>
    <script src="./scripts/template.js"></script>
</head>
<body onload="init()">
    <header class="header-logo-nav">
        <section class="header-logo-titel">
            <img src="./assets/icons/pokeball.svg" alt="">
            <p class="^header-text">Pokédex</p>
        </section>
        <nav class="search">
            <input id="main-header-search" type="text" placeholder="Search Pokemon">
            <button>search</button>
        </nav>
    </header>
    <main class="pokedex-content">
        <h1>Pokédex</h1>
        <section id="pokedex-content-area" class="main-body-card">
            
        </section>
        <div class="load-more-container">
            <button id="load-more-btn" onclick="loadPokemonBatch()">
                Mehr laden
            </button>
        </div>
        <section id="dialog-content-area" class="dialog-content-body">
            <!-- für fire das einsetzen ${} -->
            
        </section>
    </main>
    <footer class="footer-logo">
        <section class="footer-logo-titel">
            <img src="./assets/icons/pokeball.svg" alt="">
            <p class="^header-text">Pokédex</p>
        </section>
        <p>© 2026 Pokédex designed by Christian Scherlipp</p>
    </footer>
</body>
<script src="./scripts/script.js"></script>
</html>
